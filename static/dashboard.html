<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MY PAGE - 개혁신당 AI 정책 플랫폼</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg1: #0d2240;
      --bg2: #113a5c;
      --bg3: #16587a;
      --text: #f1f5f9;
      --text-strong: #ffffff;
      --muted: #cbd5e1;
      --border: rgba(148,163,184,0.18);
      --card: rgba(255,255,255,0.06);
    }
    body {
      font-family: "Pretendard Variable", "Pretendard", "Noto Sans KR", "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      min-height: 100vh;
      color: var(--text);
      padding: 2rem 1.25rem;
      background:
        radial-gradient(1000px 500px at 20% 10%, rgba(255,114,16,0.10), transparent 60%),
        radial-gradient(900px 600px at 90% 20%, rgba(56,189,248,0.10), transparent 60%),
        linear-gradient(160deg, var(--bg1) 0%, var(--bg2) 55%, var(--bg3) 100%);
      background-attachment: fixed;
    }
    .wrap { max-width: 900px; margin: 0 auto; }
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: nowrap;
      gap: 0.75rem;
      margin-bottom: 0.85rem;
      padding: 0.15rem 0;
    }
    .top-bar .nav-links { flex-shrink: 0; }
    .top-bar .brand { display: inline-flex; align-items: center; gap: 0.75rem; }
    .top-bar .brand-logo {
      display: inline-flex; align-items: center; gap: 0.55rem;
      text-decoration: none; color: inherit; line-height: 1; margin: 0;
    }
    .top-bar .brand-logo:hover { color: inherit; opacity: 0.95; }
    .top-bar .brand-logo img {
      height: 24px; width: auto; display: inline-block;
      filter: none;
    }
    .top-bar .brand-title {
      font-size: 0.95rem; font-weight: 800; letter-spacing: -0.01em; color: rgba(255,255,255,0.92);
    }
    .top-bar .brand-tag {
      display: block; margin-top: 0.22rem; font-size: 0.76rem;
      color: #ffb37a; letter-spacing: -0.01em; font-weight: 800; opacity: 0.95;
    }
    .top-bar .nav-links { margin: 0; padding: 0; display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 1.75rem;
      margin-bottom: 1.75rem;
    }
    h1 {
      font-size: 2rem;
      font-weight: 950;
      color: var(--text-strong);
      margin-bottom: 0.75rem;
      letter-spacing: -0.03em;
    }
    .page-desc {
      font-size: 1.05rem;
      color: var(--text);
      font-weight: 600;
      line-height: 1.7;
      margin-bottom: 1.5rem;
    }
    .stat { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 0; }
    .stat-item { background: rgba(0,0,0,0.2); padding: 0.75rem 1rem; border-radius: 12px; min-width: 140px; }
    .stat-item .v { font-size: 1.5rem; font-weight: 900; color: #fff; }
    .stat-item .l { font-size: 0.9rem; color: var(--muted); }
    .nav-link {
      display: inline-flex; align-items: center; justify-content: center;
      min-height: 32px; padding: 0 0.85rem;
      color: var(--text); text-decoration: none;
      font-size: 0.82rem; font-weight: 700;
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(148,163,184,0.22);
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    .nav-link:hover { background: rgba(255,255,255,0.10); color: var(--text-strong); border-color: rgba(148,163,184,0.28); }
    .nav-links .logout-link {
      background: none; border: none; padding: 0; cursor: pointer;
      color: var(--muted); font-size: 0.875rem; text-decoration: none;
      margin-left: 0.5rem; font-family: inherit;
    }
    .nav-links .logout-link:hover { color: var(--text-strong); }
    .nav-login-txt { color: var(--muted); font-size: 0.88rem; margin-right: 0.5rem; align-self: center; }
    .footer { margin-top: 2rem; padding-top: 1rem; text-align: center; font-size: 0.9rem; color: var(--muted); line-height: 1.8; border-top: 1px solid var(--border); }
    .footer a { color: #ffb37a; text-decoration: none; font-weight: 700; }
    .footer a:hover { text-decoration: underline; }
    .history-modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000;
      align-items: center; justify-content: center; padding: 1.5rem; box-sizing: border-box;
      overflow: auto;
    }
    .history-modal-overlay.open { display: flex; }
    .history-modal {
      background: linear-gradient(180deg, var(--bg2) 0%, var(--bg1) 100%);
      border: 1px solid var(--border); border-radius: 18px; max-width: 720px; width: 100%;
      max-height: calc(100vh - 3rem); display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .history-modal-header {
      display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .history-modal-header h2 { font-size: 1.1rem; color: var(--text-strong); margin: 0; }
    .history-modal-close {
      background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.5rem; line-height: 1; padding: 0.25rem;
    }
    .history-modal-close:hover { color: var(--text); }
    .history-modal-body {
      padding: 1.25rem; overflow-y: auto; flex: 1; min-height: 0;
    }
    .history-modal-body .input-label { font-size: 0.9rem; color: var(--muted); margin-bottom: 0.5rem; }
    .history-modal-body .input-block {
      background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 12px; white-space: pre-wrap; word-break: break-word;
      font-size: 0.9rem; line-height: 1.6; margin-bottom: 1.25rem;
    }
    .history-modal-body .result-label { font-size: 0.9rem; color: var(--muted); margin-bottom: 0.5rem; margin-top: 0.5rem; }
    .history-modal-body .result-content { margin-top: 0.5rem; }
    .history-modal-body .score-board { display:flex; align-items:center; gap:0.75rem; flex-wrap:wrap; padding:1rem 1.2rem; border-radius:14px; background: linear-gradient(135deg, rgba(255,114,16,0.12), rgba(56,189,248,0.10)); border:1px solid rgba(255,114,16,0.25); margin-bottom: 0.85rem; }
    .history-modal-body .score-board .score { font-size: 1.4rem; font-weight: 900; }
    .history-modal-body .badge { display: inline-flex; align-items: center; border-radius: 999px; padding: 0.3rem 0.8rem; font-size: 0.82rem; font-weight: 800; }
    .history-modal-body .badge.green { background: rgba(34,197,94,0.18); color: #86efac; }
    .history-modal-body .badge.yellow { background: rgba(250,204,21,0.18); color: #fef08a; }
    .history-modal-body .badge.red { background: rgba(248,113,113,0.18); color: #fca5a5; }
    .history-modal-body .section-cards { margin-top: 0.9rem; display: flex; flex-direction: column; gap: 0.7rem; }
    .history-modal-body .section-card { border: 1px solid rgba(148,163,184,0.28); border-radius: 12px; background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03)); overflow: hidden; }
    .history-modal-body .section-card-head { display: flex; align-items: center; justify-content: space-between; padding: 0.55rem 0.8rem; border-bottom: 1px solid rgba(148,163,184,0.22); background: rgba(2,6,23,0.25); }
    .history-modal-body .section-card-title { font-weight: 900; font-size: 0.94rem; }
    .history-modal-body .section-card-body { padding: 0.7rem 0.8rem; line-height: 1.7; }
    .history-modal-body .section-line { margin-top: 0.35rem; }
    .history-modal-body .section-line.item { margin-top: 0.5rem; }
    .summary-cards{ display:flex; flex-direction:column; gap:0.6rem; }
    .summary-card{ border:1px solid rgba(148,163,184,0.2); border-radius:10px; overflow:hidden; }
    .summary-card-head{ display:flex; align-items:center; justify-content:space-between; padding:0.5rem 0.75rem; background:rgba(2,6,23,0.3); }
    .summary-axis{ font-weight:800; font-size:0.95rem; color:#f1f5f9; }
    .summary-score{ font-weight:900; font-size:1rem; white-space:nowrap; padding:0.15rem 0.5rem; border-radius:6px; }
    .summary-score.good{ color:#4ade80; background:rgba(34,197,94,0.12); }
    .summary-score.mid{ color:#facc15; background:rgba(250,204,21,0.12); }
    .summary-score.low{ color:#f87171; background:rgba(248,113,113,0.12); }
    .summary-card-body{ padding:0 0.75rem; display:flex; flex-direction:column; }
    .summary-row{ display:flex; gap:0.55rem; align-items:flex-start; line-height:1.65; color:#f1f5f9; padding:0.6rem 0; }
    .summary-row + .summary-row{ border-top:1px solid rgba(148,163,184,0.15); }
    .summary-row-label{ flex-shrink:0; font-size:0.72rem; font-weight:800; padding:0.1rem 0.45rem; border-radius:4px; margin-top:0.22rem; letter-spacing:0.02em; }
    .summary-row-label.strength{ background:rgba(134,239,172,0.15); color:#86efac; }
    .summary-row-label.supplement{ background:rgba(252,165,165,0.15); color:#fca5a5; }
    .summary-row-text{ flex:1; }
    .summary-footer{ display:flex; align-items:center; gap:0.7rem; margin-top:0.8rem; padding-top:0.6rem; border-top:1px solid rgba(148,163,184,0.2); }
    .summary-total{ font-size:1rem; font-weight:900; color:#f1f5f9; }
    .summary-grade{ font-size:0.9rem; font-weight:900; }
    .score-card-value small{ font-size:0.65em; opacity:0.7; font-weight:600; }
    .history-modal-body .line-tag { font-size: 0.75rem; font-weight: 800; color: #93c5fd; border: 1px solid rgba(147,197,253,0.4); border-radius: 999px; padding: 0.15rem 0.5rem; }
    .history-modal-body .analysis-text { margin-top: 0.5rem; white-space: pre-wrap; word-break: break-word; }
    .history-modal-actions {
      display: flex; gap: 0.5rem; flex-wrap: wrap; padding: 1rem 1.25rem;
      border-top: 1px solid var(--border); flex-shrink: 0; background: rgba(0,0,0,0.15);
      border-radius: 0 0 18px 18px;
    }
    .history-modal-actions .btn-secondary {
      padding: 0.5rem 0.9rem; font-size: 0.875rem; font-weight: 700;
      border-radius: 8px; border: 1px solid var(--border);
      background: rgba(255,255,255,0.08); color: var(--text);
      cursor: pointer; transition: background 0.2s, border-color 0.2s;
    }
    .history-modal-actions .btn-secondary:hover {
      background: rgba(255,255,255,0.12); border-color: rgba(148,163,184,0.35);
    }
    .history-modal-actions .btn-primary {
      padding: 0.5rem 0.9rem; font-size: 0.875rem; font-weight: 700;
      border-radius: 8px; border: 1px solid var(--accent, #3b82f6);
      background: var(--accent, #3b82f6); color: #fff;
      cursor: pointer; transition: background 0.2s;
    }
    .history-modal-actions .btn-primary:hover {
      background: #2563eb;
    }
    @media (max-width: 768px) {
      .top-bar { flex-wrap: wrap; }
    }
    @media (max-width: 560px) {
      body { padding: 1rem; }
      .wrap { padding: 0 0.5rem; max-width: 100%; }
      .top-bar { flex-direction: column; align-items: stretch; flex-wrap: wrap; }
      .top-bar .brand-tag { display: none; }
      .nav-link { min-height: 32px; padding: 0 0.75rem; font-size: 0.85rem; }
      .card { padding: 1rem; }
    }
  </style>
  <link rel="stylesheet" href="/static/reform-redesign.css" />
</head>
<body class="rf-workspace-page">
  <div class="wrap">
    <div class="top-bar">
      <div class="brand">
        <a href="/" class="brand-logo">
          <img src="/static/logo.svg" alt="개혁신당 로고">
          <span class="brand-inner">
            <span class="brand-title">AI 정책 플랫폼</span>
            <span class="brand-tag">MY PAGE | 분석 기록과 사용 현황</span>
          </span>
        </a>
      </div>
      <div class="nav-links">
        <span id="loginInfo" class="nav-login-txt"></span>
        <form action="/api/auth/logout" method="POST" style="display:inline">
          <button type="submit" class="logout-link">로그아웃</button>
        </form>
    <a href="/dashboard" class="nav-link" data-nav-page="dashboard" style="display:none;">MY PAGE</a>
        <a href="/pledge" class="nav-link">공약 멘토링</a>
        <a href="/map" class="nav-link">지역 공약</a>
      </div>
    </div>
    <h1>MY PAGE</h1>
    <p class="page-desc">공약 분석 기록과 사용 현황을 확인하는 개인 페이지입니다. 열기로 상세 확인·복사·저장·인쇄가 가능합니다.</p>
    <div class="card">
      <div class="stat" id="stats">
        <div class="stat-item"><span class="l">오늘 사용</span><div class="v" id="daily">-</div><span class="l">/ <span id="dailyLimit">-</span> 회</span></div>
        <div class="stat-item"><span class="l">이번 달 사용</span><div class="v" id="monthly">-</div><span class="l">/ <span id="monthlyLimit">-</span> 회</span></div>
      </div>
    </div>

    <div class="card">
      <h2 style="font-size:1.08rem;font-weight:900;margin:0 0 0.8rem 0;color:var(--text-strong);">최근 분석 결과</h2>
      <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin:-0.35rem 0 0.8rem 0;">
        <button id="historyRefresh" type="button" style="background:rgba(0,0,0,0.18);border:1px solid rgba(148,163,184,0.22);color:#ffb37a;border-radius:12px;padding:0.55rem 0.75rem;cursor:pointer;font-weight:900;">새로고침</button>
        <button id="historyClear" type="button" style="background:rgba(0,0,0,0.18);border:1px solid rgba(148,163,184,0.22);color:#fca5a5;border-radius:12px;padding:0.55rem 0.75rem;cursor:pointer;font-weight:900;">전체 삭제</button>
      </div>
      <div id="historyEmpty" style="display:none;color:#94a3b8;font-size:0.95rem;">아직 저장된 분석 결과가 없습니다.</div>
      <div id="history" style="display:flex;flex-direction:column;gap:0.65rem;"></div>
    </div>
    <p class="footer">
      <strong>개혁신당 정책국</strong><br>
      문의: <a href="mailto:letskick@reformparty.kr">letskick@reformparty.kr</a>
    </p>
  </div>

  <div class="history-modal-overlay" id="historyModalOverlay" aria-hidden="true">
    <div class="history-modal" role="dialog" aria-labelledby="historyModalTitle">
      <div class="history-modal-header">
        <h2 id="historyModalTitle">분석 결과</h2>
        <button type="button" class="history-modal-close" id="historyModalClose" title="닫기">&times;</button>
      </div>
      <div class="history-modal-body" id="historyModalBody"></div>
      <div class="history-modal-actions">
        <button type="button" class="btn-secondary" id="historyModalCopyBtn">결과 복사</button>
        <button type="button" class="btn-secondary" id="historyModalTxtBtn">TXT로 저장</button>
        <button type="button" class="btn-secondary" id="historyModalPrintBtn">인쇄하기</button>
      </div>
    </div>
  </div>
  <script src="/static/js/check-result-render.js"></script>
  <script>
    (async () => {
      try {
        const r = await fetch('/api/usage/summary', { credentials: 'include' });
        if (!r.ok) { if (r.status === 401) window.location.href = '/login?next=' + encodeURIComponent(location.pathname); return; }
        let dashboardUser = {};
        const me = await fetch('/api/auth/me', { credentials: 'include' });
        if (me.ok) { dashboardUser = await me.json(); const el = document.getElementById('loginInfo'); if (el && dashboardUser.email) el.textContent = dashboardUser.email + ' 로그인 중'; }
        const d = await r.json();
        document.getElementById('daily').textContent = d.daily_used ?? '-';
        document.getElementById('monthly').textContent = d.monthly_used ?? '-';
        document.getElementById('dailyLimit').textContent = d.unlimited ? '무제한' : (d.daily_limit ?? '-');
        document.getElementById('monthlyLimit').textContent = d.unlimited ? '무제한' : (d.monthly_limit ?? '-');

        const esc = (s) => (s ?? '').toString().replace(/[&<>\"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',"'":'&#39;'}[c]));
        const fmt = (iso) => {
          try { return new Date(iso.replace(' ', 'T') + 'Z').toLocaleString(); } catch { return iso || ''; }
        };

        let lastHistoryModalFullText = '';
        async function loadHistory() {
          const hr = await fetch('/api/history?limit=15', { credentials: 'include' });
          if (!hr.ok) return;
          const hd = await hr.json();
          const items = hd.items || [];
          const wrap = document.getElementById('history');
          const empty = document.getElementById('historyEmpty');
          if (!items.length) { empty.style.display = 'block'; wrap.innerHTML = ''; return; }
          empty.style.display = 'none';
          wrap.innerHTML = '';

          for (const it of items) {
            const row = document.createElement('div');
            row.style.background = 'rgba(0,0,0,0.18)';
            row.style.border = '1px solid rgba(148,163,184,0.18)';
            row.style.borderRadius = '14px';
            row.style.padding = '0.85rem 0.9rem';

            const title = `[점검] ${fmt(it.created_at)}${it.from_cache ? ' (캐시)' : ''}`;
            const inputPrev = it.input_preview || '';
            const resultPrev = it.result_preview || '';

            row.innerHTML = `
              <div style="display:flex;align-items:center;justify-content:space-between;gap:0.75rem;">
                <div style="font-weight:900;color:#f8fafc;font-size:0.95rem;">${esc(title)}</div>
                <div style="display:flex;gap:0.5rem;align-items:center;">
                  <button data-open="1" type="button" style="background:none;border:none;color:#ffb37a;cursor:pointer;font-weight:900;">열기</button>
                  <button data-del="1" type="button" style="background:none;border:none;color:#fca5a5;cursor:pointer;font-weight:900;">삭제</button>
                </div>
              </div>
              <div style="margin-top:0.45rem;color:#cbd5e1;font-size:0.9rem;line-height:1.5;">
                <div style="opacity:0.85"><span style="color:#94a3b8">입력</span> · ${esc(inputPrev)}</div>
                <div style="margin-top:0.35rem;opacity:0.9"><span style="color:#94a3b8">결과</span> · ${esc(resultPrev)}</div>
              </div>
            `;

            row.querySelector('button[data-open]').addEventListener('click', async () => {
              const ir = await fetch('/api/history/' + encodeURIComponent(it.id), { credentials: 'include' });
              if (!ir.ok) return;
              const item = await ir.json();
              const CRR = window.CheckResultRender;
              const rawTxt = item.result_text || '';
              lastHistoryModalFullText = '[입력]\n' + (item.input_text || '') + '\n\n[결과]\n' + rawTxt;
              const resultHtml = CRR ? CRR.buildResultHtml(rawTxt) : ('<div class="analysis-text">' + esc(rawTxt).replace(/\n/g, '<br>') + '</div>');
              const inputBlock = '<div class="input-label">AI 분석에 넣었던 공약</div><div class="input-block">' + esc(item.input_text || '') + '</div>';
              const resultBlock = '<div class="result-label">분석 결과</div><div class="result-content">' + resultHtml + '</div>';
              document.getElementById('historyModalTitle').textContent = '분석 결과 #' + item.id;
              document.getElementById('historyModalBody').innerHTML = inputBlock + resultBlock;
              const overlay = document.getElementById('historyModalOverlay');
              overlay.classList.add('open');
              overlay.setAttribute('aria-hidden', 'false');
            });

            row.querySelector('button[data-del]').addEventListener('click', async () => {
              if (!confirm('이 결과를 삭제할까요?')) return;
              const dr = await fetch('/api/history/' + encodeURIComponent(it.id) + '/delete', { method: 'POST', credentials: 'include' });
              if (!dr.ok) return;
              await loadHistory();
            });

            wrap.appendChild(row);
          }
        }

        document.getElementById('historyRefresh')?.addEventListener('click', loadHistory);
        document.getElementById('historyClear')?.addEventListener('click', async () => {
          if (!confirm('저장된 분석 결과를 모두 삭제할까요?')) return;
          const cr = await fetch('/api/history/clear', { method: 'POST', credentials: 'include' });
          if (!cr.ok) return;
          await loadHistory();
        });

        function closeHistoryModal() {
          document.getElementById('historyModalOverlay').classList.remove('open');
          document.getElementById('historyModalOverlay').setAttribute('aria-hidden', 'true');
        }
        document.getElementById('historyModalClose').addEventListener('click', closeHistoryModal);
        document.getElementById('historyModalOverlay').addEventListener('click', function(e) {
          if (e.target === this) closeHistoryModal();
        });
        document.addEventListener('keydown', function(e) {
          if (e.key === 'Escape' && document.getElementById('historyModalOverlay').classList.contains('open')) closeHistoryModal();
        });

        document.getElementById('historyModalCopyBtn').addEventListener('click', async function() {
          const text = lastHistoryModalFullText || '';
          if (!text) return;
          try {
            await navigator.clipboard.writeText(text);
            this.textContent = '복사 완료';
            const btn = this;
            setTimeout(function() { btn.textContent = '결과 복사'; }, 1200);
          } catch (e) {
            this.textContent = '복사 실패';
            setTimeout(function() { this.textContent = '결과 복사'; }.bind(this), 1200);
          }
        });
        document.getElementById('historyModalTxtBtn').addEventListener('click', function() {
          const text = lastHistoryModalFullText || '';
          if (!text) return;
          const now = new Date();
          const name = 'analysis_' + now.getFullYear() + String(now.getMonth() + 1).padStart(2, '0') + String(now.getDate()).padStart(2, '0') + '_' + String(now.getHours()).padStart(2, '0') + String(now.getMinutes()).padStart(2, '0') + '.txt';
          const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = name;
          a.click();
          URL.revokeObjectURL(url);
        });
        document.getElementById('historyModalPrintBtn').addEventListener('click', function() {
          const text = lastHistoryModalFullText || '';
          if (!text) return;
          const w = window.open('', '_blank');
          if (!w) { alert('팝업이 차단되었습니다. 브라우저에서 팝업을 허용해 주세요.'); return; }
          const escaped = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
          w.document.write('<!DOCTYPE html><html><head><meta charset="utf-8"><title>분석 결과 인쇄</title><style>body{font-family:"Malgun Gothic",sans-serif;padding:24px;max-width:800px;margin:0 auto;line-height:1.7;color:#1e293b;}</style></head><body><div class="content">' + escaped + '</div></body></html>');
          w.document.close();
          w.focus();
          setTimeout(function() { w.print(); }, 250);
        });

        await loadHistory();
      } catch (e) { console.error(e); }
    })();
  </script>
  <script src="/static/js/nec-form-modal.js"></script>
</body>
</html>
