<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>내 공약 확인하기 - 개혁신당 AI 정책 플랫폼</title>
    <link rel="stylesheet" href="/static/css/common.css?v=2">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Pretendard Variable","Pretendard","Noto Sans KR","Malgun Gothic","Apple SD Gothic Neo",sans-serif;min-height:100vh;color:#e2e8f0;padding:20px 16px 40px;background:radial-gradient(1000px 500px at 20% 10%,rgba(255,114,16,.10),transparent 60%),radial-gradient(900px 600px at 90% 20%,rgba(56,189,248,.10),transparent 60%),linear-gradient(160deg,#04162b 0%,#073053 55%,#0a3b69 100%);background-attachment:fixed}
    .wrap{max-width:980px;margin:0 auto}
    .top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:16px}
    .brand{display:inline-flex;align-items:center;gap:12px;text-decoration:none;color:inherit}
    .brand img{height:30px}
    .brand b{display:block;font-size:17px;color:#fff}
    .brand span{display:block;font-size:13px;color:#ffb37a;font-weight:700}
    .nav{display:flex;gap:8px;flex-wrap:wrap}
    .nav a,.nav button{display:inline-flex;align-items:center;justify-content:center;min-height:38px;padding:0 14px;border-radius:10px;font-size:14px;font-weight:800;text-decoration:none;cursor:pointer;color:#e2e8f0;background:rgba(255,255,255,.06);border:1px solid rgba(148,163,184,.18)}
    h1{font-size:32px;font-weight:950;color:#fff;margin-bottom:12px}
    .sub{font-size:16px;line-height:1.7;margin-bottom:16px}
    .card{background:rgba(255,255,255,.06);border:1px solid rgba(148,163,184,.18);border-radius:18px;padding:22px;box-shadow:0 18px 40px rgba(0,0,0,.28);backdrop-filter:blur(10px);margin-bottom:16px}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:16px}
    .item{background:rgba(255,255,255,.04);border:1px solid rgba(148,163,184,.12);border-radius:14px;padding:14px 16px}
    .item em{display:block;font-style:normal;font-size:12px;color:#94a3b8;margin-bottom:6px;font-weight:700}
    .item b{display:block;color:#fff;line-height:1.5}
    .badge{display:inline-flex;align-items:center;border-radius:999px;padding:5px 12px;font-size:13px;font-weight:800}
    .bnew{background:rgba(59,130,246,.16);color:#bfdbfe}
    .bpen{background:rgba(250,204,21,.16);color:#fde68a}
    .bapp{background:rgba(34,197,94,.16);color:#bbf7d0}
    .brej{background:rgba(239,68,68,.16);color:#fecaca}
    .bmix{background:rgba(56,189,248,.16);color:#bae6fd}
    .ainfo{margin-top:12px;padding:13px 15px;border-radius:12px;line-height:1.6;font-size:14px;border:1px solid rgba(148,163,184,.18)}
    .pending{background:rgba(250,204,21,.08);border-color:rgba(250,204,21,.22);color:#fde68a}
    .approved{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.22);color:#bbf7d0}
    .rejected{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.22);color:#fecaca}
    .mixed{background:rgba(56,189,248,.08);border-color:rgba(56,189,248,.22);color:#bae6fd}
    .list{display:grid;gap:14px}
    .sectionhead{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px}
    .sectioncopy{display:grid;gap:6px}
    .sectioncopy .title{font-size:20px}
    .sectioncopy .desc{font-size:13px;line-height:1.6;color:#94a3b8}
    .togglebtn{display:inline-flex;align-items:center;justify-content:center;min-height:38px;padding:0 14px;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;color:#e2e8f0;background:rgba(255,255,255,.06);border:1px solid rgba(148,163,184,.18)}
    .togglebtn:hover{background:rgba(255,255,255,.1)}
    .historybody[hidden]{display:none}
    .row{background:rgba(2,6,23,.24);border:1px solid rgba(148,163,184,.14);border-radius:16px;padding:16px}
    .rowtop{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:10px}
    .ord{display:inline-flex;align-items:center;gap:10px;font-weight:900;color:#fff}
    .ord .n{width:30px;height:30px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;background:rgba(255,255,255,.08);color:#cbd5e1;font-size:13px}
    .title{font-size:18px;font-weight:800;color:#fff;line-height:1.5}
    .content{margin-top:10px;padding:14px 16px;border-radius:12px;background:rgba(0,0,0,.18);border:1px solid rgba(148,163,184,.1);white-space:pre-wrap;word-break:break-word;line-height:1.7;color:#dbeafe}
    .review{margin-top:12px;padding:12px 14px;border-radius:12px;border:1px solid rgba(148,163,184,.18);font-size:14px;line-height:1.65}
    .review.pending{background:rgba(250,204,21,.06);border-color:rgba(250,204,21,.14);color:#fde68a}
    .review.approved{background:rgba(34,197,94,.06);border-color:rgba(34,197,94,.16);color:#bbf7d0}
    .review.rejected{background:rgba(239,68,68,.06);border-color:rgba(239,68,68,.16);color:#fecaca}
    .meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:12px}
    .score{display:inline-flex;align-items:center;border-radius:999px;padding:4px 11px;font-size:13px;font-weight:800}
    .good{background:rgba(34,197,94,.14);color:#bbf7d0}
    .mid{background:rgba(250,204,21,.14);color:#fde68a}
    .low{background:rgba(239,68,68,.14);color:#fecaca}
    .date{font-size:12px;color:#94a3b8}
    .loading,.empty{text-align:center;padding:32px 16px;color:#94a3b8;line-height:1.7}
    @media (max-width:768px){
      body{padding:16px 12px 32px}
      .top{align-items:stretch}
      .brand{width:100%}
      .brand span{min-width:0}
      .nav{width:100%}
      .nav a,.nav button{flex:1 1 calc(50% - 4px);min-width:0}
      h1{font-size:28px;line-height:1.25}
      .sub{font-size:15px;line-height:1.65}
      .card{padding:18px}
      .grid{grid-template-columns:1fr}
      .sectionhead{align-items:flex-start}
      .sectioncopy .title{font-size:18px}
      .togglebtn{width:100%}
      .row{padding:14px}
      .rowtop{align-items:flex-start}
      .title{font-size:16px;line-height:1.45}
      .content{padding:12px 14px;font-size:14px;line-height:1.65}
      .review{font-size:13px}
      .meta{align-items:flex-start}
    }
    @media (max-width:540px){
      .nav a,.nav button{flex-basis:100%}
    }
  </style>
  <link rel="stylesheet" href="/static/reform-redesign.css" />
</head>
<body class="rf-workspace-page">
  <div class="wrap">
    <div class="top">
      <a class="brand" href="/">
        <img src="/static/logo.svg" alt="개혁신당 로고">
        <span><b>AI 정책 플랫폼</b><span>MY PAGE | 내 공약 공개 상태 확인</span></span>
      </a>
      <nav class="nav">
        <a href="/my-pledges">내 공약 올리기</a>
        <a href="/map">지도 보기</a>
        <form action="/api/auth/logout" method="POST"><button type="submit">로그아웃</button></form>
      </nav>
    </div>
    <h1>내 공약 확인하기</h1>
    <p class="sub">공약별 승인 여부와 현재 공개 상태, 그리고 과거 반려/승인 이력을 함께 확인할 수 있습니다.</p>
    <div id="loading" class="card loading">공약 상태를 불러오는 중입니다.</div>
    <div id="no-position" class="card empty" style="display:none;">출마 정보가 확인되지 않아 공약 상태를 불러올 수 없습니다.</div>
    <div id="main" style="display:none;">
      <div class="card">
        <div id="info" class="grid"></div>
        <div style="margin-top:16px" id="badge"></div>
        <div id="approval"></div>
      </div>
      <div class="card">
        <div id="list" class="list"></div>
      </div>
      <div class="card" id="history-wrap" style="display:none;">
        <div class="sectionhead">
          <div class="sectioncopy">
            <div class="title" id="history-title"></div>
            <div class="desc" id="history-desc"></div>
          </div>
          <button type="button" class="togglebtn" id="history-toggle"></button>
        </div>
        <div id="history-body" class="historybody" hidden>
          <div id="history" class="list"></div>
        </div>
      </div>
    </div>
  </div>
  <script>
    const T = {
      approved: '\uC2B9\uC778 \uC644\uB8CC',
      rejected: '\uBC18\uB824',
      mixed: '\uACF5\uC57D\uBCC4 \uC0C1\uC774',
      pending: '\uAC80\uC218 \uB300\uAE30',
      newItem: '\uC2E0\uADDC \uB4F1\uB85D',
      noPledges: '\uB4F1\uB85D\uB41C \uACF5\uC57D\uC774 \uC5C6\uC2B5\uB2C8\uB2E4.',
      loadingError: '\uACF5\uC57D \uC0C1\uD0DC\uB97C \uBD88\uB7EC\uC624\uC9C0 \uBABB\uD588\uC2B5\uB2C8\uB2E4.',
      candidateName: '\uD6C4\uBCF4\uC790\uBA85',
      electionPosition: '\uCD9C\uB9C8 \uC720\uD615',
      region: '\uC9C0\uC5ED',
      district: '\uC120\uAC70\uAD6C',
      currentPledge: '\uD604\uC7AC \uACF5\uC57D',
      summary: '\uCC98\uB9AC \uD604\uD669 \uC694\uC57D',
      historyHeader: '\uACFC\uAC70 \uBC18\uB824/\uC2B9\uC778 \uC774\uB825',
      historyDesc: '\uC774\uC804 \uAC80\uD1A0 \uC2DC\uC810\uC758 \uACF5\uC57D \uC6D0\uBB38\uC744 \uC2DC\uAC04\uC21C\uC73C\uB85C \uD655\uC778\uD560 \uC218 \uC788\uC2B5\uB2C8\uB2E4.',
      historyCollapsed: '\uC774\uB825 \uD3BC\uCCD0\uBCF4\uAE30',
      historyExpanded: '\uC774\uB825 \uC811\uAE30',
      historySummary: '\uC2B9\uC778 {approved}\uAC74, \uBC18\uB824 {rejected}\uAC74, \uB300\uAE30 {pending}\uAC74',
      historyEntry: '\uC774\uB825',
      bundleRejected: '\uD604\uC7AC \uACF5\uC57D\uC740 \uBAA8\uB450 \uBC18\uB824 \uC0C1\uD0DC\uC785\uB2C8\uB2E4.',
      bundleApproved: '\uD604\uC7AC \uACF5\uC57D\uC740 \uBAA8\uB450 \uC2B9\uC778\uB418\uC5B4 \uACF5\uAC1C \uC911\uC785\uB2C8\uB2E4.',
      bundleMixed: '\uC2B9\uC778\uB41C \uACF5\uC57D\uACFC \uBC18\uB824\uB41C \uACF5\uC57D\uC774 \uD568\uAED8 \uC788\uC2B5\uB2C8\uB2E4. \uC544\uB798 \uBAA9\uB85D\uC5D0\uC11C \uACF5\uC57D\uBCC4 \uC0C1\uD0DC\uB97C \uD655\uC778\uD558\uC138\uC694.',
      bundlePending: '\uACF5\uC57D \uAC80\uC218 \uC9C4\uD589 \uC0C1\uD669\uC744 \uC544\uB798 \uBAA9\uB85D\uC5D0\uC11C \uD655\uC778\uD558\uC138\uC694.',
      noPerPledgeHistory: '\uACF5\uC57D\uBCC4 \uCC98\uB9AC \uAE30\uB85D \uC5C6\uC74C',
      pendingReview: '\uAC80\uC218 \uB300\uAE30',
      pendingReviewDesc: '\uC774 \uACF5\uC57D\uC740 \uAD00\uB9AC\uC790 \uAC80\uC218 \uD6C4 \uACF5\uAC1C\uB429\uB2C8\uB2E4.',
      approvedDesc: '\uC774 \uACF5\uC57D\uC740 \uC2B9\uC778\uB418\uC5B4 \uACF5\uAC1C \uC911\uC785\uB2C8\uB2E4.',
      rejectedDesc: '\uC774 \uACF5\uC57D\uC740 \uD604\uC7AC \uACF5\uAC1C\uB418\uC9C0 \uC54A\uC2B5\uB2C8\uB2E4.',
      groupRejected: '\uC774 \uC2DC\uC810\uC758 \uACF5\uC57D \uBB36\uC74C\uC740 \uBC18\uB824\uB418\uC5C8\uC2B5\uB2C8\uB2E4.',
      groupApproved: '\uC774 \uC2DC\uC810\uC758 \uACF5\uC57D \uBB36\uC74C\uC740 \uC2B9\uC778\uB418\uC5B4 \uACF5\uAC1C\uB418\uC5C8\uC2B5\uB2C8\uB2E4.',
      groupResubmit: '\uC7AC\uC81C\uCD9C \uC804 \uC0C1\uD0DC\uC758 \uACF5\uC57D \uC6D0\uBB38\uC785\uB2C8\uB2E4.',
      rejectReason: '\uBC18\uB824 \uC0AC\uC720',
      commonRejectReason: '\uACF5\uD1B5 \uBC18\uB824 \uC0AC\uC720',
      totalScore: '\uCD1D\uC810',
      created: '\uB4F1\uB85D',
      analyzed: '\uBD84\uC11D',
      reviewed: '\uCC98\uB9AC',
      event: '\uC774\uBCA4\uD2B8',
      approveCount: '\uC2B9\uC778',
      rejectCount: '\uBC18\uB824',
      pendingCount: '\uB300\uAE30',
    };

    const els = {
      loading: document.getElementById('loading'),
      noPos: document.getElementById('no-position'),
      main: document.getElementById('main'),
      info: document.getElementById('info'),
      badge: document.getElementById('badge'),
      approval: document.getElementById('approval'),
      list: document.getElementById('list'),
      historyWrap: document.getElementById('history-wrap'),
      historyTitle: document.getElementById('history-title'),
      historyDesc: document.getElementById('history-desc'),
      historyToggle: document.getElementById('history-toggle'),
      historyBody: document.getElementById('history-body'),
      history: document.getElementById('history'),
    };
    let historyExpanded = false;

    const esc = (v) => String(v || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    const fdate = (v) => {
      if (!v) return '';
      const d = new Date(String(v).replace(' ', 'T'));
      if (Number.isNaN(d.getTime())) return String(v);
      return new Intl.DateTimeFormat('ko-KR', {
        timeZone: 'Asia/Seoul',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false,
      }).format(d);
    };
    const badgeClass = (status) => {
      const s = String(status || 'NEW').toUpperCase();
      if (s === 'APPROVED') return ['bapp', T.approved];
      if (s === 'REJECTED') return ['brej', T.rejected];
      if (s === 'MIXED') return ['bmix', T.mixed];
      if (s === 'PENDING') return ['bpen', T.pending];
      return ['bnew', T.newItem];
    };
    const scoreClass = (n) => !Number.isFinite(Number(n)) ? 'mid' : Number(n) >= 80 ? 'good' : Number(n) >= 60 ? 'mid' : 'low';
    const infoItem = (label, value) => `<div class="item"><em>${esc(label)}</em><b>${esc(value || '-')}</b></div>`;

    function getStats(pledges) {
      return pledges.reduce((acc, pledge) => {
        const status = String(pledge.approval_status || 'PENDING').toUpperCase();
        if (status === 'APPROVED') acc.approved += 1;
        else if (status === 'REJECTED') acc.rejected += 1;
        else acc.pending += 1;
        return acc;
      }, { approved: 0, rejected: 0, pending: 0 });
    }

    function approvalHtml(candidate, stats) {
      if (!candidate) return `<div class="ainfo pending">${T.noPledges}</div>`;
      if (stats.approved && stats.rejected) return `<div class="ainfo mixed">${T.bundleMixed}</div>`;
      if (stats.rejected && !stats.approved && !stats.pending) return `<div class="ainfo rejected">${T.bundleRejected}${candidate.rejection_reason ? `<br><strong>${T.commonRejectReason}:</strong> ${esc(candidate.rejection_reason)}` : ''}</div>`;
      if (stats.approved && !stats.rejected && !stats.pending) return `<div class="ainfo approved">${T.bundleApproved}</div>`;
      return `<div class="ainfo pending">${T.bundlePending}</div>`;
    }

    function pledgeReviewHtml(pledge, candidate, hasPerPledgeHistory) {
      const status = String(pledge.approval_status || 'PENDING').toUpperCase();
      if (status === 'APPROVED') return `<div class="review approved"><strong>${T.approved}</strong><br>${T.approvedDesc}</div>`;
      if (status === 'REJECTED') return `<div class="review rejected"><strong>${T.rejected}</strong><br>${T.rejectedDesc}${pledge.rejection_reason ? `<br><strong>${T.rejectReason}:</strong> ${esc(pledge.rejection_reason)}` : ''}</div>`;
      if (!hasPerPledgeHistory && candidate && String(candidate.approval_status || 'PENDING').toUpperCase() === 'REJECTED') {
        return `<div class="review rejected"><strong>${T.noPerPledgeHistory}</strong><br>${T.groupRejected}${candidate.rejection_reason ? `<br><strong>${T.commonRejectReason}:</strong> ${esc(candidate.rejection_reason)}` : ''}</div>`;
      }
      return `<div class="review pending"><strong>${T.pendingReview}</strong><br>${T.pendingReviewDesc}</div>`;
    }

    function renderPledges(pledges, candidate) {
      if (!pledges.length) {
        els.list.innerHTML = `<div class="empty">${T.noPledges}</div>`;
        return;
      }
      const stats = getStats(pledges);
      const hasPerPledgeHistory = (stats.approved + stats.rejected) > 0;
      const summary = `<div class="row"><div class="title">${T.summary}</div><div class="meta"><span class="badge bapp">${T.approveCount} ${stats.approved}건</span><span class="badge brej">${T.rejectCount} ${stats.rejected}건</span><span class="badge bpen">${T.pendingCount} ${stats.pending}건</span></div></div>`;
      const items = pledges.map((pledge, index) => {
        const [bc, bt] = badgeClass(pledge.approval_status || 'PENDING');
        const score = (pledge.total_score === null || pledge.total_score === undefined || pledge.total_score === '') ? null : Number(pledge.total_score);
        return `<div class="row"><div class="rowtop"><div class="ord"><span class="n">${index + 1}</span><span>${T.currentPledge}</span></div><span class="badge ${bc}">${bt}</span></div><div class="title">${esc(pledge.title || '-')}</div><div class="content">${esc(pledge.content || '-')}</div>${pledgeReviewHtml(pledge, candidate, hasPerPledgeHistory)}<div class="meta">${score !== null && Number.isFinite(score) ? `<span class="score ${scoreClass(score)}">${T.totalScore} ${score.toFixed(1)}</span>` : ''}${pledge.created_at ? `<span class="date">${T.created} ${esc(fdate(pledge.created_at))}</span>` : ''}${pledge.analyzed_at ? `<span class="date">${T.analyzed} ${esc(fdate(pledge.analyzed_at))}</span>` : ''}</div></div>`;
      }).join('');
      els.list.innerHTML = summary + items;
    }

    function historyLabel(status) {
      const s = String(status || 'PENDING').toUpperCase();
      if (s === 'REJECTED') return T.rejected;
      if (s === 'APPROVED') return T.approved;
      return T.pendingReview;
    }

    function toggleHistory(expanded) {
      historyExpanded = !!expanded;
      els.historyBody.hidden = !historyExpanded;
      els.historyToggle.textContent = historyExpanded ? T.historyExpanded : T.historyCollapsed;
      els.historyToggle.setAttribute('aria-expanded', historyExpanded ? 'true' : 'false');
    }

    function sourceActionLabel(action) {
      const value = String(action || '').toUpperCase();
      if (value === 'REJECT') return T.rejected;
      if (value === 'APPROVE') return T.approved;
      if (value === 'DELETE_PLEDGE') return '\uC0AD\uC81C';
      if (value === 'RESUBMIT') return '\uC7AC\uC81C\uCD9C';
      return action || '-';
    }

    function historyReviewHtml(group) {
      const status = String(group.approval_status || 'PENDING').toUpperCase();
      if (status === 'REJECTED') {
        return `<div class="review rejected"><strong>${T.rejected}</strong><br>${T.groupRejected}${group.rejection_reason ? `<br><strong>${T.rejectReason}:</strong> ${esc(group.rejection_reason)}` : ''}</div>`;
      }
      if (status === 'APPROVED') {
        return `<div class="review approved"><strong>${T.approved}</strong><br>${T.groupApproved}</div>`;
      }
      return `<div class="review pending"><strong>${T.pendingReview}</strong><br>${T.groupResubmit}</div>`;
    }

    function renderHistory(history) {
      if (!Array.isArray(history) || history.length === 0) {
        els.historyWrap.style.display = 'none';
        return;
      }
      const counts = history.reduce((acc, group) => {
        const status = String(group.approval_status || 'PENDING').toUpperCase();
        if (status === 'APPROVED') acc.approved += 1;
        else if (status === 'REJECTED') acc.rejected += 1;
        else acc.pending += 1;
        return acc;
      }, { approved: 0, rejected: 0, pending: 0 });
      const sections = history.map((group, groupIndex) => {
        const [bc, bt] = badgeClass(group.approval_status || 'PENDING');
        const rows = (group.pledges || []).map((pledge, index) => {
          const score = (pledge.total_score === null || pledge.total_score === undefined || pledge.total_score === '') ? null : Number(pledge.total_score);
          return `<div class="row"><div class="rowtop"><div class="ord"><span class="n">${index + 1}</span><span>${historyLabel(group.approval_status)}</span></div><span class="badge ${bc}">${bt}</span></div><div class="title">${esc(pledge.title || '-')}</div><div class="content">${esc(pledge.content || '-')}</div>${historyReviewHtml(group)}<div class="meta">${score !== null && Number.isFinite(score) ? `<span class="score ${scoreClass(score)}">${T.totalScore} ${score.toFixed(1)}</span>` : ''}${pledge.created_at ? `<span class="date">${T.created} ${esc(fdate(pledge.created_at))}</span>` : ''}${group.reviewed_at ? `<span class="date">${T.reviewed} ${esc(fdate(group.reviewed_at))}</span>` : ''}</div></div>`;
        }).join('');
        return `<div class="row"><div class="rowtop"><div class="title">${historyLabel(group.approval_status)} ${T.historyEntry} ${history.length - groupIndex}</div><span class="badge ${bc}">${bt}</span></div><div class="meta">${group.reviewed_at ? `<span class="date">${T.reviewed} ${esc(fdate(group.reviewed_at))}</span>` : ''}${group.source_action ? `<span class="date">${T.event} ${esc(sourceActionLabel(group.source_action))}</span>` : ''}</div></div>${rows}`;
      }).join('');
      els.historyTitle.textContent = T.historyHeader;
      els.historyDesc.textContent = T.historySummary
        .replace('{approved}', String(counts.approved))
        .replace('{rejected}', String(counts.rejected))
        .replace('{pending}', String(counts.pending));
      els.history.innerHTML = sections;
      els.historyWrap.style.display = 'block';
      toggleHistory(false);
    }

    els.historyToggle.addEventListener('click', () => toggleHistory(!historyExpanded));

    async function load() {
      try {
        const res = await fetch('/api/my/candidate', { credentials: 'include' });
        if (res.status === 401) {
          location.href = '/login?next=/my-pledges-status';
          return;
        }
        if (res.status === 403) {
          location.href = '/pending';
          return;
        }
        if (!res.ok) throw new Error(T.loadingError);
        const data = await res.json();
        const ui = data.user_info || {};
        const candidate = data.candidate || null;
        const pledges = Array.isArray(data.pledges) ? data.pledges : [];
        const history = Array.isArray(data.review_history) ? data.review_history : [];
        const stats = getStats(pledges);

        if (!ui.election_position || !ui.region_code) {
          els.loading.style.display = 'none';
          els.noPos.style.display = 'block';
          return;
        }

        els.info.innerHTML = [
          infoItem(T.candidateName, ui.name || (candidate && candidate.name) || '-'),
          infoItem(T.electionPosition, ui.election_position || ui.election_type || '-'),
          infoItem(T.region, ui.region_name || '-'),
          infoItem(T.district, ui.district_name || '-'),
        ].join('');
        const [bc, bt] = badgeClass(candidate ? candidate.approval_status : 'NEW');
        els.badge.innerHTML = `<span class="badge ${bc}">${bt}</span>`;
        els.approval.innerHTML = approvalHtml(candidate, stats);
        renderPledges(pledges, candidate);
        renderHistory(history);
        els.loading.style.display = 'none';
        els.main.style.display = 'block';
      } catch (e) {
        els.loading.textContent = e.message || T.loadingError;
      }
    }

    load();
  </script>
  </div>
  <div data-shared-footer></div>
  <script src="/static/js/shared-footer.js?v=2"></script>
</body>
</html>
