<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>정책 자료 허브 — 개혁신당</title>
  <link rel="stylesheet" href="/static/reform-redesign.css" />
  <style>
    body { margin:0; min-height:100vh; font-family:"Pretendard","Noto Sans KR",sans-serif; color:var(--rf-text); background:radial-gradient(900px 500px at 10% 10%, rgba(255,122,26,0.14), transparent 60%), radial-gradient(700px 450px at 90% 15%, rgba(29,155,240,0.12), transparent 58%), linear-gradient(160deg, #04111d 0%, #082238 52%, #0b3152 100%); padding:24px 16px 40px; }
    main { max-width:960px; margin:0 auto; display:grid; gap:16px; }
    .hub-header { padding:32px 28px 24px; border:1px solid var(--rf-line); background:var(--rf-panel); border-radius:var(--rf-radius-lg); backdrop-filter:blur(12px); text-align:center; }
    .hub-header h1 { margin:0 0 8px; font-size:36px; font-weight:900; color:#fff; letter-spacing:-0.02em; }
    .hub-header p { margin:0; color:var(--rf-text-muted); font-size:16px; line-height:1.6; }
    .hub-search-bar { display:flex; gap:8px; margin-top:16px; }
    .hub-search-bar input { flex:1; padding:10px 14px; border-radius:var(--rf-radius-sm); border:1px solid var(--rf-line); background:rgba(255,255,255,0.06); color:#fff; font-size:15px; outline:none; }
    .hub-search-bar input::placeholder { color:var(--rf-text-muted); }
    .hub-search-bar input:focus { border-color:var(--rf-accent); }
    .hub-search-bar button { padding:10px 20px; border-radius:var(--rf-radius-sm); border:none; background:var(--rf-accent); color:#fff; font-weight:700; font-size:14px; cursor:pointer; white-space:nowrap; }
    .hub-chips { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
    .hub-chip { padding:6px 14px; border-radius:999px; border:1px solid var(--rf-line); background:rgba(255,255,255,0.04); color:var(--rf-text-muted); font-size:13px; font-weight:600; cursor:pointer; transition:all 0.15s; }
    .hub-chip.active { background:var(--rf-accent-soft); border-color:var(--rf-accent); color:#ffbf93; }
    .hub-chip:hover { background:rgba(255,255,255,0.08); }
    .hub-status { padding:12px 16px; text-align:center; color:var(--rf-text-muted); font-size:14px; }
    .hub-grid { display:grid; gap:10px; }
    .hub-card { padding:16px; border:1px solid var(--rf-line); background:var(--rf-panel); border-radius:var(--rf-radius-md); cursor:pointer; transition:background 0.15s, border-color 0.15s; display:grid; gap:6px; }
    .hub-card:hover { background:var(--rf-panel-strong); border-color:var(--rf-line-strong); }
    .hub-card-top { display:flex; align-items:center; gap:8px; }
    .hub-badge { padding:3px 10px; border-radius:999px; font-size:11px; font-weight:700; background:var(--rf-accent-soft); color:#ffbf93; }
    .hub-badge.pos { background:rgba(74,210,149,0.15); color:#4ad295; }
    .hub-card-date { font-size:12px; color:var(--rf-text-muted); margin-left:auto; }
    .hub-card-title { font-size:18px; font-weight:700; color:#fff; line-height:1.45; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .hub-card-summary { font-size:14px; color:var(--rf-text-muted); line-height:1.65; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .hub-card-speaker { font-size:12px; color:var(--rf-accent-alt); }
    .hub-detail { padding:20px; border:1px solid var(--rf-line); background:var(--rf-panel); border-radius:var(--rf-radius-lg); backdrop-filter:blur(12px); display:none; }
    .hub-detail.open { display:block; }
    .hub-detail-close { float:right; background:none; border:none; color:var(--rf-text-muted); font-size:20px; cursor:pointer; padding:4px 8px; }
    .hub-detail-title { font-size:22px; font-weight:700; color:#fff; line-height:1.3; margin-bottom:8px; }
    .hub-detail-meta { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; }
    .hub-detail-meta .meta-pill { padding:6px 12px; border-radius:999px; border:1px solid var(--rf-line); background:rgba(255,255,255,0.06); font-size:12px; color:var(--rf-text-muted); }
    .hub-detail-body { color:var(--rf-text); line-height:1.75; font-size:15px; white-space:pre-wrap; max-height:600px; overflow-y:auto; }
    .hub-detail-body::-webkit-scrollbar { width:6px; }
    .hub-detail-body::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.15); border-radius:3px; }
    .hub-load-more { display:block; width:100%; padding:12px; border-radius:var(--rf-radius-sm); border:1px solid var(--rf-line); background:rgba(255,255,255,0.04); color:var(--rf-text-muted); font-size:14px; font-weight:600; cursor:pointer; text-align:center; }
    .hub-load-more:hover { background:rgba(255,255,255,0.08); }
    .hub-denied { text-align:center; padding:60px 20px; color:var(--rf-text-muted); }
    .hub-denied h2 { color:#fff; margin-bottom:8px; }
    @media(max-width:640px){
      body { padding:14px 10px 28px; }
      .hub-header { padding:24px 18px 20px; }
      .hub-header h1 { font-size:28px; }
      .hub-header p { font-size:14px; }
      .hub-search-bar { flex-direction:column; }
      .hub-search-bar button { width:100%; }
      .hub-card { padding:14px; }
      .hub-card-title { font-size:16px; }
      .hub-card-summary { font-size:13px; }
      .hub-detail-title { font-size:18px; }
      .hub-detail-body { font-size:14px; }
    }
  </style>
</head>
<body>
  <main>
    <section class="hub-header">
      <h1>정책 자료 허브</h1>
      <p>정강정책·공약·논평·여론조사 등 모든 자료를 검색하고 열람합니다.</p>
      <div class="hub-search-bar">
        <input type="text" id="hubSearchInput" placeholder="검색어를 입력하세요 (예: 청년 주거, 교통)" />
        <button id="hubSearchBtn">검색</button>
      </div>
      <div class="hub-chips" id="hubChips"></div>
    </section>

    <div class="hub-status" id="hubStatus" style="display:none;"></div>
    <div class="hub-grid" id="hubGrid"></div>
    <button class="hub-load-more" id="hubLoadMore" style="display:none;">더 보기</button>

    <section class="hub-detail" id="hubDetail">
      <button class="hub-detail-close" id="hubDetailClose">&times;</button>
      <div class="hub-detail-title" id="hubDetailTitle"></div>
      <div class="hub-detail-meta" id="hubDetailMeta"></div>
      <div class="hub-detail-body" id="hubDetailBody"></div>
    </section>

    <div class="hub-denied" id="hubDenied" style="display:none;">
      <h2>오픈 준비 중</h2>
      <p>정책 자료 허브는 현재 준비 중입니다. 곧 공개될 예정이니 조금만 기다려 주세요.</p>
      <p style="margin-top:12px;"><a href="/" style="color:var(--rf-accent);">메인으로 돌아가기</a></p>
    </div>
  </main>

<script>
(function() {
  const DOC_TYPES = [
    { key: '', label: '전체' },
    { key: 'position', label: '정책포지션' },
    { key: 'bill', label: '법안' },
    { key: 'commentary', label: '논평' },
    { key: 'poll', label: '여론조사' },
    { key: 'pledge', label: '공약' },
    { key: 'platform', label: '정강정책' },
    { key: 'briefing', label: '브리핑' },
    { key: 'meeting', label: '회의록' },
  ];

  let currentQuery = '';
  let currentDocType = '';
  let currentOffset = 0;
  const PAGE_SIZE = 30;
  let allItems = [];

  function safe(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
  function truncate(s, n) { s = (s || '').trim(); return s.length > n ? s.slice(0, n) + '…' : s; }

  // Render filter chips
  function renderChips() {
    const container = document.getElementById('hubChips');
    container.innerHTML = DOC_TYPES.map(t =>
      `<button class="hub-chip${t.key === currentDocType ? ' active' : ''}" data-type="${safe(t.key)}">${safe(t.label)}</button>`
    ).join('');
    container.querySelectorAll('.hub-chip').forEach(btn => {
      btn.onclick = () => {
        currentDocType = btn.dataset.type;
        currentOffset = 0;
        allItems = [];
        renderChips();
        doSearch();
      };
    });
  }

  // Search API
  async function fetchResults(q, docType, limit, offset) {
    const params = new URLSearchParams();
    if (q) params.set('q', q);
    if (docType) params.set('doc_type', docType);
    params.set('limit', String(limit));
    params.set('offset', String(offset));
    const r = await fetch('/api/policy/hub/search?' + params.toString());
    if (!r.ok) throw new Error('검색 실패');
    return r.json();
  }

  // Render results
  function renderCards(items, append) {
    const grid = document.getElementById('hubGrid');
    if (!append) grid.innerHTML = '';

    if (!items.length && !append) {
      const status = document.getElementById('hubStatus');
      status.textContent = currentQuery ? `"${currentQuery}"에 대한 검색 결과가 없습니다.` : '등록된 자료가 없습니다.';
      status.style.display = '';
      document.getElementById('hubLoadMore').style.display = 'none';
      return;
    }

    document.getElementById('hubStatus').style.display = 'none';

    items.forEach(item => {
      const card = document.createElement('div');
      card.className = 'hub-card';
      const isPos = item.source === 'position';
      const badgeClass = isPos ? ' pos' : '';
      const typeLabel = item.type_label || item.doc_type || '';
      const speaker = item.speaker_name ? `<div class="hub-card-speaker">${safe(item.speaker_name)}</div>` : '';
      card.innerHTML =
        `<div class="hub-card-top">` +
          `<span class="hub-badge${badgeClass}">${safe(typeLabel)}</span>` +
          `${speaker}` +
          `<span class="hub-card-date">${safe(item.published_at || '')}</span>` +
        `</div>` +
        `<div class="hub-card-title">${safe(item.title)}</div>` +
        `<div class="hub-card-summary">${safe(truncate(item.summary, 160))}</div>`;
      card.onclick = () => loadDetail(item);
      grid.appendChild(card);
    });

    // Show/hide load more
    document.getElementById('hubLoadMore').style.display = items.length >= PAGE_SIZE ? '' : 'none';
  }

  async function doSearch() {
    const grid = document.getElementById('hubGrid');
    const status = document.getElementById('hubStatus');
    status.textContent = '검색 중...';
    status.style.display = '';
    grid.innerHTML = '';
    document.getElementById('hubLoadMore').style.display = 'none';
    document.getElementById('hubDetail').classList.remove('open');

    try {
      const data = await fetchResults(currentQuery, currentDocType, PAGE_SIZE, 0);
      if (!data) return;
      allItems = data.items || [];
      currentOffset = allItems.length;
      renderCards(allItems, false);
    } catch (err) {
      status.textContent = '검색 중 오류가 발생했습니다.';
      status.style.display = '';
      console.error(err);
    }
  }

  async function loadMore() {
    try {
      const data = await fetchResults(currentQuery, currentDocType, PAGE_SIZE, currentOffset);
      if (!data) return;
      const newItems = data.items || [];
      allItems = allItems.concat(newItems);
      currentOffset += newItems.length;
      renderCards(newItems, true);
    } catch (err) {
      console.error(err);
    }
  }

  // Detail panel
  async function loadDetail(item) {
    const detail = document.getElementById('hubDetail');
    detail.classList.add('open');

    document.getElementById('hubDetailTitle').textContent = item.title || '';

    const meta = [];
    if (item.type_label) meta.push(item.type_label);
    if (item.published_at) meta.push(item.published_at);
    if (item.speaker_name) meta.push(item.speaker_name);
    document.getElementById('hubDetailMeta').innerHTML = meta.map(v => `<span class="meta-pill">${safe(v)}</span>`).join('');

    document.getElementById('hubDetailBody').textContent = '불러오는 중...';

    try {
      let data;
      if (item.source === 'position') {
        const r = await fetch(`/api/policy/positions/${encodeURIComponent(item.id)}`);
        if (r.ok) data = await r.json();
      } else {
        const r = await fetch(`/api/policy/documents/${encodeURIComponent(item.id)}`);
        if (r.ok) data = await r.json();
      }
      if (data) {
        document.getElementById('hubDetailBody').textContent = data.body || data.summary || '내용 없음';
      } else {
        document.getElementById('hubDetailBody').textContent = '자료를 불러올 수 없습니다.';
      }
    } catch {
      document.getElementById('hubDetailBody').textContent = '자료를 불러올 수 없습니다.';
    }

    detail.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // Events
  document.getElementById('hubSearchBtn').onclick = () => {
    currentQuery = document.getElementById('hubSearchInput').value.trim();
    currentOffset = 0;
    allItems = [];
    doSearch();
  };

  document.getElementById('hubSearchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      currentQuery = e.target.value.trim();
      currentOffset = 0;
      allItems = [];
      doSearch();
    }
  });

  document.getElementById('hubLoadMore').onclick = loadMore;

  document.getElementById('hubDetailClose').onclick = () => {
    document.getElementById('hubDetail').classList.remove('open');
  };

  // Auth gate — admin only
  async function init() {
    try {
      const r = await fetch('/api/me', { credentials: 'include' });
      if (r.ok) {
        const d = await r.json();
        if (!d.is_admin) {
          showDenied(); return;
        }
      } else {
        showDenied(); return;
      }
    } catch {
      showDenied(); return;
    }
    renderChips();
    doSearch();
  }

  function showDenied() {
    document.querySelector('.hub-header').style.display = 'none';
    document.getElementById('hubGrid').style.display = 'none';
    document.getElementById('hubLoadMore').style.display = 'none';
    document.getElementById('hubDetail').style.display = 'none';
    document.getElementById('hubDenied').style.display = '';
  }

  init();
})();
</script>
</body>
</html>
