<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공약 생성 코치 - 개혁신당</title>
  <link rel="stylesheet" href="/static/css/common.css?v=2">
  <style>
    .chat-shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 800px;
      margin: 0 auto;
      padding: 0 1rem;
    }

    .chat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .chat-header h1 {
      font-size: 1.1rem;
      color: var(--text-strong);
    }

    .back-link {
      color: var(--brand-light);
      text-decoration: none;
      font-weight: 700;
      font-size: 0.9rem;
    }

    .back-link:hover { text-decoration: underline; }

    /* 시작 화면 */
    .start-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 1.25rem;
      padding: 2rem 0;
    }

    .start-panel h2 {
      font-size: 1.3rem;
      color: var(--text-strong);
    }

    .start-panel p {
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
      max-width: 480px;
    }

    .start-form {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      max-width: 480px;
    }

    .start-form select,
    .start-form input {
      padding: 0.7rem 0.9rem;
      border-radius: 8px;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: var(--text);
      font-size: 0.95rem;
    }

    .start-form select:focus,
    .start-form input:focus {
      outline: none;
      border-color: var(--brand);
      background: var(--input-bg-focus);
    }

    .btn-start {
      padding: 0.75rem;
      border: none;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-start:hover { background: var(--brand-hover); }
    .btn-start:disabled { opacity: 0.5; cursor: not-allowed; }

    /* 채팅 영역 */
    .chat-area {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }

    .chat-area.active {
      display: flex;
    }

    .chat-topic-bar {
      padding: 0.5rem 0;
      font-size: 0.85rem;
      color: var(--muted2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 0;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .msg {
      max-width: 85%;
      padding: 0.7rem 1rem;
      border-radius: 12px;
      font-size: 0.93rem;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.assistant {
      align-self: flex-start;
      background: var(--card);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    .msg.user {
      align-self: flex-end;
      background: var(--brand-soft);
      color: var(--text-strong);
      border-bottom-right-radius: 4px;
    }

    .msg.streaming {
      opacity: 0.9;
    }

    .msg.system-notice {
      align-self: center;
      background: var(--info-bg);
      color: var(--muted);
      font-size: 0.82rem;
      max-width: 90%;
      text-align: center;
    }

    /* 입력 바 */
    .input-bar {
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem 0;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-bar input {
      flex: 1;
      padding: 0.65rem 0.9rem;
      border-radius: 8px;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: var(--text);
      font-size: 0.93rem;
    }

    .input-bar input:focus {
      outline: none;
      border-color: var(--brand);
      background: var(--input-bg-focus);
    }

    .btn-send {
      padding: 0.65rem 1.1rem;
      border: none;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-send:hover { background: var(--brand-hover); }
    .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-finalize {
      padding: 0.65rem 1.1rem;
      border: 1px solid var(--brand);
      border-radius: 8px;
      background: transparent;
      color: var(--brand-light);
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      font-size: 0.85rem;
    }

    .btn-finalize:hover { background: var(--brand-soft); }
    .btn-finalize:disabled { opacity: 0.5; cursor: not-allowed; }

    /* 최종 공약문 영역 */
    .final-draft-panel {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }

    .final-draft-panel.active {
      display: flex;
    }

    .final-draft-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .final-draft-header h2 {
      font-size: 1rem;
      color: var(--text-strong);
    }

    .final-draft-content {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 0;
      white-space: pre-wrap;
      line-height: 1.7;
      color: var(--text);
      font-size: 0.93rem;
    }

    .final-draft-actions {
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem 0;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .btn-copy, .btn-back-chat {
      padding: 0.6rem 1rem;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .btn-copy {
      border: none;
      background: var(--brand);
      color: #fff;
    }

    .btn-back-chat {
      border: 1px solid var(--border-strong);
      background: transparent;
      color: var(--muted);
    }

    /* 세션 목록 */
    .sessions-toggle {
      color: var(--muted2);
      font-size: 0.82rem;
      cursor: pointer;
      text-decoration: underline;
    }

    .sessions-list {
      display: none;
      padding: 0.5rem 0;
      max-height: 200px;
      overflow-y: auto;
    }

    .sessions-list.open { display: block; }

    .session-item {
      padding: 0.4rem 0.6rem;
      cursor: pointer;
      border-radius: 6px;
      font-size: 0.82rem;
      color: var(--muted);
      transition: background 0.15s;
    }

    .session-item:hover {
      background: var(--card);
      color: var(--text);
    }

    .session-item .topic { color: var(--text); font-weight: 600; }
    .session-item .meta { color: var(--muted3); font-size: 0.75rem; }
  </style>
</head>
<body>
  <div class="chat-shell">
    <div class="chat-header">
      <a href="/static/tools.html" class="back-link">AI 도구</a>
      <h1>공약 생성 코치</h1>
      <span class="sessions-toggle" onclick="toggleSessions()">이전 대화</span>
    </div>

    <div class="sessions-list" id="sessionsList"></div>

    <!-- 시작 화면 -->
    <div class="start-panel" id="startPanel">
      <div id="chatGreetingArea" style="text-align:left;width:100%;max-width:480px;line-height:1.7;color:var(--text);margin-bottom:0.5rem;"></div>
      <div class="start-form">
        <div id="guidedChoices" style="display:flex;flex-direction:column;gap:0.5rem;margin-bottom:0.5rem;"></div>
        <select id="outputFormat">
          <option value="정책">정책</option>
          <option value="지역공약">지역공약</option>
          <option value="논평">논평</option>
          <option value="메시지">메시지</option>
        </select>
        <input type="text" id="topicInput" placeholder="직접 주제를 입력하셔도 됩니다 (예: 청년 주거 안정)" maxlength="500">
        <button class="btn-start" id="btnStart" onclick="startChat()">대화 시작</button>
      </div>
    </div>

    <!-- 채팅 영역 -->
    <div class="chat-area" id="chatArea">
      <div class="chat-topic-bar" id="topicBar"></div>
      <div class="messages" id="messages"></div>
      <div class="input-bar">
        <input type="text" id="msgInput" placeholder="메시지를 입력하세요..." maxlength="2000"
               onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}">
        <button class="btn-send" id="btnSend" onclick="sendMessage()">전송</button>
        <button class="btn-finalize" id="btnFinalize" onclick="finalizeChat()">방향 정리 보기</button>
      </div>
    </div>

    <!-- 최종 공약문 -->
    <div class="final-draft-panel" id="finalPanel">
      <div class="final-draft-header">
        <h2>최종 공약문</h2>
      </div>
      <div class="final-draft-content" id="finalContent"></div>
      <div class="final-draft-actions">
        <button class="btn-copy" onclick="copyDraft()">복사</button>
        <button class="btn-back-chat" onclick="backToChat()">대화로 돌아가기</button>
      </div>
    </div>
  </div>

  <script>
    let currentSessionId = null;
    let isStreaming = false;

    // ── 세션 시작 ────────────────────────────────────────────

    async function startChat() {
      const topic = document.getElementById('topicInput').value.trim();
      const format = document.getElementById('outputFormat').value;
      if (!topic) return;

      const btn = document.getElementById('btnStart');
      btn.disabled = true;
      btn.textContent = '시작 중...';

      try {
        document.getElementById('startPanel').style.display = 'none';
        const chatArea = document.getElementById('chatArea');
        chatArea.classList.add('active');
        document.getElementById('topicBar').textContent = topic + ' (' + format + ')';
        document.getElementById('messages').innerHTML = '';

        const resp = await fetch('/api/pledge-chat/start', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ topic, output_format: format }),
          credentials: 'include',
        });

        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          throw new Error(err.detail || resp.statusText);
        }

        await handleSSE(resp, (sessionId) => {
          currentSessionId = sessionId;
        });
      } catch (e) {
        appendMessage('system-notice', '오류: ' + e.message);
      } finally {
        btn.disabled = false;
        btn.textContent = '대화 시작';
      }
    }

    // ── 메시지 전송 ──────────────────────────────────────────

    async function sendMessage() {
      if (isStreaming || !currentSessionId) return;
      const input = document.getElementById('msgInput');
      const msg = input.value.trim();
      if (!msg) return;

      input.value = '';
      appendMessage('user', msg);

      setInputEnabled(false);

      try {
        const resp = await fetch('/api/pledge-chat/' + currentSessionId + '/message', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: msg }),
          credentials: 'include',
        });

        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          throw new Error(err.detail || resp.statusText);
        }

        await handleSSE(resp);
      } catch (e) {
        appendMessage('system-notice', '오류: ' + e.message);
      } finally {
        setInputEnabled(true);
        document.getElementById('msgInput').focus();
      }
    }

    // ── 공약문 생성 ──────────────────────────────────────────

    async function finalizeChat() {
      if (isStreaming || !currentSessionId) return;

      setInputEnabled(false);
      appendMessage('system-notice', '공약문을 생성하고 있습니다...');

      try {
        const resp = await fetch('/api/pledge-chat/' + currentSessionId + '/finalize', {
          method: 'POST',
          credentials: 'include',
        });

        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          throw new Error(err.detail || resp.statusText);
        }

        const finalContent = document.getElementById('finalContent');
        finalContent.textContent = '';

        document.getElementById('chatArea').classList.remove('active');
        document.getElementById('finalPanel').classList.add('active');

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            try {
              const data = JSON.parse(line.slice(6));
              if (data.type === 'chunk') {
                finalContent.textContent += data.text;
              } else if (data.type === 'error') {
                finalContent.textContent += '\n[오류] ' + data.detail;
              }
            } catch (e) {}
          }
        }
      } catch (e) {
        appendMessage('system-notice', '오류: ' + e.message);
        setInputEnabled(true);
      }
    }

    // ── SSE 처리 ─────────────────────────────────────────────

    async function handleSSE(resp, onSession) {
      isStreaming = true;
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let msgEl = null;

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          try {
            const data = JSON.parse(line.slice(6));

            if (data.type === 'session' && data.session_id) {
              if (onSession) onSession(data.session_id);
            } else if (data.type === 'chunk') {
              if (!msgEl) {
                msgEl = appendMessage('assistant streaming', '');
              }
              msgEl.textContent += data.text;
              scrollToBottom();
            } else if (data.type === 'done') {
              if (msgEl) msgEl.classList.remove('streaming');
              msgEl = null;
            } else if (data.type === 'error') {
              appendMessage('system-notice', '오류: ' + data.detail);
            }
          } catch (e) {}
        }
      }

      isStreaming = false;
    }

    // ── UI 헬퍼 ──────────────────────────────────────────────

    function appendMessage(cls, text) {
      const el = document.createElement('div');
      el.className = 'msg ' + cls;
      el.textContent = text;
      document.getElementById('messages').appendChild(el);
      scrollToBottom();
      return el;
    }

    function scrollToBottom() {
      const msgs = document.getElementById('messages');
      msgs.scrollTop = msgs.scrollHeight;
    }

    function setInputEnabled(enabled) {
      document.getElementById('msgInput').disabled = !enabled;
      document.getElementById('btnSend').disabled = !enabled;
      document.getElementById('btnFinalize').disabled = !enabled;
    }

    function copyDraft() {
      const text = document.getElementById('finalContent').textContent;
      navigator.clipboard.writeText(text).then(() => {
        const btn = event.target;
        btn.textContent = '복사됨';
        setTimeout(() => btn.textContent = '복사', 1500);
      });
    }

    function backToChat() {
      document.getElementById('finalPanel').classList.remove('active');
      document.getElementById('chatArea').classList.add('active');
    }

    // ── 세션 목록 ────────────────────────────────────────────

    function toggleSessions() {
      const list = document.getElementById('sessionsList');
      if (list.classList.contains('open')) {
        list.classList.remove('open');
        return;
      }

      fetch('/api/pledge-chat/sessions', { credentials: 'include' })
        .then(r => r.json())
        .then(data => {
          list.innerHTML = '';
          if (!data.sessions || data.sessions.length === 0) {
            list.innerHTML = '<div class="session-item"><span class="meta">이전 대화가 없습니다</span></div>';
          } else {
            data.sessions.forEach(s => {
              const item = document.createElement('div');
              item.className = 'session-item';
              const status = s.status === 'finalized' ? ' [완료]' : '';
              item.innerHTML = '<span class="topic">' + escapeHtml(s.topic) + status + '</span><br><span class="meta">' + s.output_format + ' / ' + s.created_at + '</span>';
              item.onclick = () => loadSession(s.id);
              list.appendChild(item);
            });
          }
          list.classList.add('open');
        })
        .catch(() => {});
    }

    async function loadSession(sessionId) {
      try {
        const resp = await fetch('/api/pledge-chat/' + sessionId, { credentials: 'include' });
        if (!resp.ok) return;
        const data = await resp.json();

        currentSessionId = sessionId;
        document.getElementById('startPanel').style.display = 'none';
        document.getElementById('finalPanel').classList.remove('active');

        const chatArea = document.getElementById('chatArea');
        chatArea.classList.add('active');
        document.getElementById('topicBar').textContent = data.session.topic + ' (' + data.session.output_format + ')';

        const msgs = document.getElementById('messages');
        msgs.innerHTML = '';
        data.messages.forEach(m => {
          appendMessage(m.role, m.content);
        });

        if (data.session.status === 'finalized' && data.session.final_draft) {
          document.getElementById('finalContent').textContent = data.session.final_draft;
        }

        document.getElementById('sessionsList').classList.remove('open');

        // finalized면 입력 비활성화
        if (data.session.status === 'finalized') {
          setInputEnabled(false);
        } else {
          setInputEnabled(true);
        }
      } catch (e) {}
    }

    function escapeHtml(text) {
      const d = document.createElement('div');
      d.textContent = text;
      return d.innerHTML;
    }

    // Enter 키로 시작
    document.getElementById('topicInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        startChat();
      }
    });

    // 인사말 + 가이드 선택지
    (async function initGreeting() {
      var labelMap = { metro_mayor:'광역단체장', local_mayor:'기초단체장', regional_council:'광역의원', local_council:'기초의원', party_official:'당직자' };
      var greetArea = document.getElementById('chatGreetingArea');
      var choicesArea = document.getElementById('guidedChoices');
      try {
        var r = await fetch('/api/auth/me', { credentials: 'include' });
        if (!r.ok) return;
        var d = await r.json();
        var name = d.name || '';
        var role = labelMap[d.election_position] || d.election_position || '후보';
        var region = d.region_name || '';
        var district = d.district_name || '';
        var location = [region, district].filter(Boolean).join(' ');

        var intro = '안녕하세요.';
        if (name || location) {
          intro = '안녕하세요, ' + (location ? location + ' ' : '') + role + (name ? ' ' + name + ' 후보님.' : '님.');
        }

        greetArea.innerHTML = '<h2 style="font-size:1.2rem;margin-bottom:0.5rem;">' + escapeHtml(intro) + '</h2>'
          + '<p style="color:var(--muted);line-height:1.6;margin:0;">'
          + '이 도구는 선거구 기준 생활 이슈, 지방의회 자료, 관련 기사, 우리당 자료, 공공데이터를 바탕으로 정책 방향을 좁혀가는 보조도구입니다.'
          + '<br>공약 생성 코치가 질문을 던지며 함께 공약을 만들어갑니다.'
          + '</p>';

        var choices = [
          { label: '이 지역 핵심 이슈부터 알고 싶다', topic: (district || region || '우리 지역') + ' 핵심 생활 이슈' },
          { label: '내 정책 아이디어를 다듬고 싶다', topic: '' },
          { label: '우리당 공약과 연결해서 방향 잡기', topic: '우리당 공약 연계 정책 방향' },
          { label: '비슷한 지역 사례부터 참고하기', topic: (district || region || '유사 지역') + ' 유사 사례 참고' },
        ];

        var btnStyle = 'display:block;width:100%;padding:0.7rem 1rem;border:1px solid var(--input-border);border-radius:8px;background:var(--input-bg);color:var(--text);font-size:0.9rem;cursor:pointer;text-align:left;';
        choices.forEach(function(c) {
          var btn = document.createElement('button');
          btn.setAttribute('style', btnStyle);
          btn.textContent = c.label;
          btn.onmouseover = function() { btn.style.borderColor = 'var(--brand-light)'; };
          btn.onmouseout = function() { btn.style.borderColor = 'var(--input-border)'; };
          btn.onclick = function() {
            if (c.topic) {
              document.getElementById('topicInput').value = c.topic;
              startChat();
            } else {
              document.getElementById('topicInput').focus();
              document.getElementById('topicInput').placeholder = '어떤 정책 아이디어가 있으신가요?';
            }
          };
          choicesArea.appendChild(btn);
        });
      } catch (e) {
        greetArea.innerHTML = '<h2 style="font-size:1.2rem;">AI와 함께 공약을 만들어 보세요</h2>'
          + '<p style="color:var(--muted);line-height:1.6;">주제를 입력하면 공약 생성 코치가 질문을 던지며 지역 이슈와 정책 방향을 함께 좁혀갑니다.</p>';
      }
    })();
  </script>
</body>
</html>
