<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사용량 통계 - 공약 멘토링</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Pretendard Variable", "Pretendard", "Noto Sans KR", "Malgun Gothic", "Apple SD Gothic Neo", sans-serif; background: linear-gradient(160deg, #04162b 0%, #073053 55%, #0a3b69 100%); min-height: 100vh; color: #e2e8f0; padding: 2rem; }
    .wrap { max-width: 1200px; margin: 0 auto; }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; color: #f8fafc; }
    .card { background: rgba(255,255,255,0.06); border: 1px solid rgba(148,163,184,0.18); border-radius: 18px; padding: 1.5rem; margin-bottom: 1rem; }
    .links { margin-bottom: 1rem; }
    .links a { color: #ffb37a; text-decoration: none; font-weight: 700; margin-right: 1rem; }
    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table { width: 100%; border-collapse: collapse; min-width: 780px; }
    th, td { padding: 0.6rem; text-align: left; border-bottom: 1px solid rgba(148,163,184,0.2); }
    th { color: #f8fafc; font-size: 0.92rem; }
    td { vertical-align: top; }
    .name-cell { font-weight: 700; color: #f8fafc; white-space: nowrap; }
    .email-cell { color: #cbd5e1; word-break: break-all; }
    .meta-cell { color: #cbd5e1; min-width: 360px; white-space: nowrap !important; word-break: keep-all; }
    .meta-inline { display: inline-block; white-space: nowrap !important; }
    .count-cell, .cost-cell { white-space: nowrap; }
    select { padding: 0.4rem 0.75rem; border-radius: 10px; background: rgba(0,0,0,0.22); color: #fff; border: 1px solid rgba(148,163,184,0.28); margin-bottom: 1rem; }
    @media (max-width: 640px) {
      body { padding: 1rem; }
      .card { padding: 1rem; border-radius: 14px; }
      h1 { font-size: 1.25rem; }
    }
  </style>
  <link rel="stylesheet" href="/static/reform-redesign.css" />
</head>
<body class="rf-admin-page">
  <div class="wrap">
    <div class="links"><a href="/admin">← 관리자</a></div>
    <h1>사용량 통계</h1>
    <div class="card">
      <label>기간: </label>
      <select id="period" onchange="load()">
        <option value="7">최근 7일</option>
        <option value="30">최근 30일</option>
        <option value="90">최근 90일</option>
      </select>
      <div class="table-scroll">
      <table>
        <thead>
          <tr><th>이름</th><th>이메일</th><th>출마 정보</th><th>호출 횟수</th><th>비용 추정</th></tr>
        </thead>
        <tbody id="list"></tbody>
      </table>
      </div><!-- /.table-scroll -->
    </div>
  </div>
  <script>
    function esc(v) { return String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function formatElection(position) {
      const labels = {
        metro_mayor: '광역단체장',
        regional_council: '광역의원',
        local_mayor: '기초단체장',
        local_council: '기초의원',
        party_official: '당직자',
      };
      return labels[position] || position || '-';
    }
    function formatCandidacy(row) {
      const election = formatElection(row.election_position);
      const location = [row.region_name, row.district_name].filter(Boolean).join(' / ');
      if (election && location) return `${election} | ${location}`;
      return election || location || '-';
    }
    async function load() {
      const period = document.getElementById('period').value;
      const r = await fetch(`/api/admin/usage/stats?period=${period}`, { credentials: 'include' });
      if (!r.ok) return;
      const d = await r.json();
      const tbody = document.getElementById('list');
      tbody.innerHTML = '';
      for (const row of d.by_user || []) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="name-cell">${esc(row.name || '-')}</td>
          <td class="email-cell">${esc(row.email || row.user_id)}</td>
          <td class="meta-cell"><span class="meta-inline">${esc(formatCandidacy(row))}</span></td>
          <td class="count-cell">${esc(row.count)}</td>
          <td class="cost-cell">${(row.cost_estimate || 0).toFixed(6)}</td>
        `;
        tbody.appendChild(tr);
      }
    }
    load();
  </script>
</body>
</html>
