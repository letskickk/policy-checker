<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>승인 대기 - 공약 멘토링</title>
    <link rel="stylesheet" href="/static/css/common.css?v=2">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Pretendard Variable", "Pretendard", "Noto Sans KR", "Malgun Gothic", "Apple SD Gothic Neo", sans-serif; background: linear-gradient(160deg, #04162b 0%, #073053 55%, #0a3b69 100%); min-height: 100vh; color: #e2e8f0; padding: 2rem; }
    .card { background: rgba(255,255,255,0.06); border: 1px solid rgba(148,163,184,0.18); border-radius: 18px; padding: 2rem; max-width: 500px; margin: 2rem auto; }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; color: #f8fafc; }
    p { line-height: 1.7; margin-bottom: 1rem; word-break: keep-all; }
    .nav { margin-top: 1.5rem; display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .nav-link {
      display: inline-flex; align-items: center; justify-content: center;
      min-height: 36px; padding: 0 0.9rem;
      color: #e2e8f0; text-decoration: none;
      font-size: 0.875rem; font-weight: 700;
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(148,163,184,0.18);
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    .nav-link:hover { background: rgba(255,255,255,0.10); color: #f8fafc; border-color: rgba(148,163,184,0.28); }
    .nav .logout-btn {
      min-height: 36px; padding: 0 0.9rem; font-size: 0.875rem; font-weight: 700;
      border-radius: 8px; border: 1px solid rgba(148,163,184,0.18);
      background: rgba(255,255,255,0.06); color: #e2e8f0;
      cursor: pointer; transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    .nav .logout-btn:hover { background: rgba(255,255,255,0.10); color: #f8fafc; border-color: rgba(148,163,184,0.28); }
    .nav form { display: inline; }
    .footer { margin-top: 2rem; padding-top: 1rem; text-align: center; font-size: 0.9rem; color: #94a3b8; line-height: 1.8; }
    .footer a { color: #ffb37a; text-decoration: none; font-weight: 700; }
    .footer a:hover { text-decoration: underline; }
  </style>
  <link rel="stylesheet" href="/static/reform-redesign.css" />
</head>
<body class="rf-auth-page">
  <div class="card">
    <h1>승인 대기 중</h1>
    <p>관리자 승인 후 분석 기능을 이용할 수 있습니다.</p>
    <p>승인 완료 시 자동으로 내 기록 페이지로 이동합니다.</p>
    <p>문의: <a href="mailto:letskick@reformparty.kr" style="color:#ffb37a;">letskick@reformparty.kr</a></p>
    <div class="nav">
      <a href="/" class="nav-link">메인으로</a>
      <form action="/api/auth/logout" method="POST" style="display:inline">
        <button type="submit" class="logout-btn">로그아웃</button>
      </form>
    </div>
  </div>
  <div data-shared-footer></div>
  <script src="/static/js/shared-footer.js?v=2"></script>
</body>
</html>
